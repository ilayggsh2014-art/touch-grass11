name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Move project to root
      run: |
        mv "touch-grass-android (1)/android" ./android_build

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Force Clean Gradle Properties
      run: |
        echo "android.useAndroidX=true" > ./android_build/gradle.properties
        echo "android.enableJetifier=true" >> ./android_build/gradle.properties
        echo "kotlin.code.style=official" >> ./android_build/gradle.properties

    - name: Change wrapper permissions
      run: chmod +x ./android_build/gradlew

    - name: Build Debug APK
      run: |
        cd ./android_build
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: touch-grass-debug
        path: ./android_build/app/build/outputs/apk/debug/app-debug.apk
