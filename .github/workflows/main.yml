name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Change wrapper permissions
      run: chmod +x "touch-grass-android (1)/android/gradlew"

    - name: Build Debug APK
      run: |
        cd "touch-grass-android (1)/android"
        ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: touch-grass-debug
        path: "touch-grass-android (1)/android/app/build/outputs/apk/debug/app-debug.apk"
